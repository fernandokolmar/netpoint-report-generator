name: Build macOS App

on:
  # Executar manualmente pelo GitHub
  workflow_dispatch:

  # Ou ao fazer push na branch main
  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'netpoint_macos.spec'

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow

    - name: Build macOS App
      run: |
        pyinstaller netpoint_macos.spec --clean

    - name: Create DMG
      run: |
        # Criar DMG para distribuição fácil
        hdiutil create -volname "Netpoint Report Generator" \
          -srcfolder "dist/Netpoint Report Generator.app" \
          -ov -format UDZO \
          "dist/Netpoint_Report_Generator_macOS.dmg"

    - name: Upload macOS App
      uses: actions/upload-artifact@v4
      with:
        name: Netpoint-Report-Generator-macOS
        path: |
          dist/Netpoint Report Generator.app
          dist/Netpoint_Report_Generator_macOS.dmg
        retention-days: 30

  # Job adicional para criar Release (opcional)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: Netpoint-Report-Generator-macOS
        path: dist/

    - name: Display structure
      run: ls -la dist/
