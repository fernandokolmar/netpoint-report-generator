name: Build macOS App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag do release para publicar o DMG (ex: v1.9.1)'
        required: false
        default: ''

  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow

    - name: Build macOS App
      run: |
        pyinstaller netpoint_macos.spec --clean --noconfirm

    - name: Create DMG
      run: |
        hdiutil create -volname "Netpoint Report Generator" \
          -srcfolder "dist/Netpoint Report Generator.app" \
          -ov -format UDZO \
          "dist/Netpoint_Report_Generator_macOS.dmg"

    - name: Upload artifact (backup)
      uses: actions/upload-artifact@v4
      with:
        name: Netpoint-Report-Generator-macOS
        path: dist/Netpoint_Report_Generator_macOS.dmg
        retention-days: 30

    - name: Determine release tag
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        elif [ -n "${{ github.event.inputs.version }}" ]; then
          echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "tag=" >> $GITHUB_OUTPUT
        fi

    - name: Upload DMG to existing release
      if: steps.tag.outputs.tag != ''
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.tag.outputs.tag }}"
        # Aguarda até 60s para o release existir (criado manualmente ou por outro job)
        for i in $(seq 1 12); do
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG encontrado"
            break
          fi
          echo "Aguardando release $TAG... ($i/12)"
          sleep 5
        done
        gh release upload "$TAG" \
          "dist/Netpoint_Report_Generator_macOS.dmg#Netpoint.Report.Generator.macOS.dmg" \
          --clobber
